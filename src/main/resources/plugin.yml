name: LumenEssentials
version: '${version}'
main: com.lumen.essentials.LumenEssentials
api-version: '1.13'
author: gangymanny6741
description: Modular SMP anti-cheat, anti-xray and staff investigation toolkit.
website: https://github.com/kylevoluu-hue/mc-server-plugins
folia-supported: false

commands:
  luac:
    description: Lumen Essentials main command.
    usage: /luac help
    aliases: [lumen]
  flag:
    description: Flag a player for suspicion with a reason.
    usage: /flag <player> <reason>
    permission: lumen.flag
  flaglist:
    description: Open the flagged-players menu.
    usage: /flaglist
    permission: lumen.flag
  stats:
    description: View a player's stats menu.
    usage: /stats [player]
    permission: lumen.stats
  warp:
    description: Warp to a configured location.
    usage: /warp <name>
    permission: lumen.warp
  sswarp:
    description: Set a warp at your location.
    usage: /sswarp <name>
    permission: lumen.warp.admin
  rtp:
    description: Randomly teleport around the survival world.
    usage: /rtp
    permission: lumen.rtp
  rtpworld:
    description: Set the RTP world.
    usage: /rtpworld <world>
    permission: lumen.rtp.admin
  rtpamount:
    description: Set the RTP maximum radius.
    usage: /rtpamount <radius>
    permission: lumen.rtp.admin
  tpa:
    description: Request to teleport to a player.
    usage: /tpa <player>
    permission: lumen.tpa
  tpahere:
    description: Request a player to teleport to you.
    usage: /tpahere <player>
    permission: lumen.tpa
  tpaccept:
    description: Accept a pending teleport request.
    usage: /tpaccept
    permission: lumen.tpa
  tpauto:
    description: Toggle auto-accepting teleport requests.
    usage: /tpauto
    permission: lumen.tpa
  tp:
    description: Teleport (staff).
    usage: /tp <player> | <p1> <p2> | <x y z>
    permission: lumen.tp
  settings:
    description: Open your personal settings menu.
    usage: /settings
    permission: lumen.settings
  coins:
    description: View or manage Coins.
    usage: /coins [player] | give|take|set <player> <amount>
    permission: lumen.economy
  keys:
    description: View your keys.
    usage: /keys
    permission: lumen.economy
  key:
    description: Manage player keys.
    usage: /key <give|take|set> <player> <keyId> <amount>
    permission: lumen.economy.admin
  crates:
    description: Open the crates menu.
    usage: /crates
    permission: lumen.economy
  crate:
    description: Open or manage crates.
    usage: /crate [open <id>|reload]
    permission: lumen.economy
  merchant:
    description: Open the merchant shop.
    usage: /merchant
    permission: lumen.economy
  afkzone:
    description: Manage AFK zones.
    usage: /afkzone <pos1|pos2|create|remove|setreward|list>
    permission: lumen.afkzone.admin
  economy:
    description: Economy admin.
    usage: /economy reload
    permission: lumen.economy.admin

permissions:
  luac.admin:
    description: Full administrative access to Lumen Essentials.
    default: op
  luac.alerts:
    description: Receive anti-cheat staff alerts.
    default: op
  luac.debug:
    description: Toggle and receive verbose debug output.
    default: op
  luac.bypass:
    description: Bypass all checks (trusted players / staff).
    default: false
  luac.exempt:
    description: Manage and hold check exemptions.
    default: op
  luac.investigate:
    description: Use staff investigation tooling.
    default: op
  luac.spawnstash:
    description: Create investigation test stashes.
    default: op
  luac.oresummon:
    description: Create investigation test ore veins.
    default: op
  lumen.flag:
    description: Flag players and view the flag list.
    default: op
  lumen.stats:
    description: View your own stats menu.
    default: true
  lumen.stats.others:
    description: View other players' stats menus.
    default: op
  lumen.warp:
    description: Use warps.
    default: true
  lumen.warp.admin:
    description: Set and manage warps.
    default: op
  lumen.rtp:
    description: Use random teleport.
    default: true
  lumen.rtp.admin:
    description: Configure random teleport.
    default: op
  lumen.tpa:
    description: Use teleport requests.
    default: true
  lumen.tp:
    description: Use staff teleport.
    default: op
  lumen.silkspawner:
    description: Harvest mob spawners with Silk Touch.
    default: true
  lumen.settings:
    description: Open the personal settings menu.
    default: true
  lumen.economy:
    description: Use coins, keys, crates and the merchant.
    default: true
  lumen.economy.admin:
    description: Manage coins, keys and reload the economy.
    default: op
  lumen.afkzone.admin:
    description: Create and manage AFK zones.
    default: op
